<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low - Final Edition</title>
    <style>
        :root { 
            --card-w: 28vw; --card-h: 42vw; 
            --gold: linear-gradient(135deg, #f9d423 0%, #ffdb6e 50%, #b8860b 100%);
            --gold-solid: #ffd700;
            --dark-green: radial-gradient(circle, #1b5e20 0%, #051a05 100%);
        }
        @media (min-width: 600px) { :root { --card-w: 140px; --card-h: 200px; } }
        body { font-family: 'Georgia', serif; background: var(--dark-green); color: white; margin: 0; overflow: hidden; text-align: center; }
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 15px 0; background: rgba(0,0,0,0.7); border-bottom: 2px solid #b8860b; }
        .score-box { flex: 1; transition: 0.4s; opacity: 0.5; }
        .score-box.active { opacity: 1; transform: scale(1.1); color: var(--gold-solid); }
        .score-val { font-size: 2rem; font-weight: bold; }
        #status-msg { margin: 15px 10px; font-size: 1.1rem; height: 3.5rem; color: var(--gold-solid); font-weight: bold; }
        .field { display: flex; gap: 20px; margin: 10px 0; justify-content: center; position: relative; perspective: 1000px; }
        .slot { width: var(--card-w); height: var(--card-h); border: 1px solid rgba(184, 134, 11, 0.4); border-radius: 12px; position: relative; background: rgba(0,0,0,0.3); }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(184, 134, 11, 0.6); transition: transform 0.6s; transform-style: preserve-3d; }
        .card img { width: 100%; height: 100%; object-fit: cover; backface-visibility: hidden; }
        .card-back { background: #8b0000; border: 2px solid #ffd700; background-image: repeating-linear-gradient(45deg, #8b0000, #8b0000 10px, #a52a2a 10px, #a52a2a 20px); backface-visibility: hidden; }
        .dealing { transform: translateY(-100vh) rotate(20deg); opacity: 0; }
        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 400px; margin: 10px auto; }
        .btn { flex: 1; padding: 18px; border-radius: 8px; border: 1px solid #b8860b; font-size: 1.1rem; font-weight: bold; background: var(--gold); color: #222; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { background: #333; color: #666; border-color: #444; }
        .btn-sub { background: none; color: var(--gold-solid); border: 1px solid var(--gold-solid); padding: 10px; margin-top: 10px; border-radius: 5px; cursor: pointer; }
        .overlay, .winner-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #051a05; padding: 20px; }
        .winner-overlay { background: rgba(0,0,0,0.95); display: none; }
        #how-to-overlay { display: none; background: rgba(0,0,0,0.9); border: 2px solid var(--gold-solid); border-radius: 15px; max-width: 85%; max-height: 80%; overflow-y: auto; text-align: left; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; padding: 25px; }
        #prediction-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: none; background: rgba(0,0,0,0.8); border: 2px solid var(--gold-solid); }
        @keyframes flash { 0% { background: var(--dark-green); } 50% { background: #1b5e20; } 100% { background: var(--dark-green); } }
        .win-flash { animation: flash 0.5s; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: 2px solid #b8860b; background: #111; color: white; text-align: center; margin-bottom: 10px; width: 80%; max-width: 300px; }
        .manual-h { color: var(--gold-solid); font-weight: bold; border-left: 4px solid var(--gold-solid); padding-left: 10px; margin: 15px 0 5px; }
        .manual-p { font-size: 0.9rem; line-height: 1.5; color: #ccc; margin: 0 0 10px 0; }
    </style>
</head>
<body>

<audio id="bgm" loop src="jazz.mp3"></audio>

<div id="setup-overlay" class="overlay">
    <h1 style="color:#ffd700; font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 5px;">ROYAL CASINO</h1>
    <p style="color:#aaa; font-size: 0.8rem; margin-bottom: 25px;">THE STRATEGY HIGH & LOW</p>
    <input type="text" id="room-id" placeholder="ROOM ID (for Online)" inputmode="latin">
    <div class="btn-group">
        <button class="btn" onclick="startMode('ONLINE')">ONLINE</button>
        <button class="btn" style="background: #444; color:white; border-color:#666;" onclick="startMode('SOLO')">SOLO</button>
    </div>
    <button class="btn-sub" onclick="toggleManual(true)">HOW TO PLAY</button>
</div>

<div id="how-to-overlay">
    <h2 style="color:var(--gold-solid); text-align: center;">RULE BOOK</h2>
    <div class="manual-h">基本ルール</div>
    <p class="manual-p">配られた2枚のカードを比較し、右側のカードが左より大きい(HIGH)か小さい(LOW)かを当てるゲームです。</p>
    <div class="manual-h">カードの強さ（数字通り）</div>
    <p class="manual-p">A(1) < 2 < 3 ... < 10 < J(11) < Q(12) < K(13)<br>※Aが最弱、Kが最強となります。</p>
    <div class="manual-h">勝利条件</div>
    <p class="manual-p">親と子が交互に入れ替わり、先に**10ポイント**先取したプレイヤーが勝者です。</p>
    <button class="btn" style="margin-top:20px; width:100%;" onclick="toggleManual(false)">CLOSE</button>
</div>

<div id="winner-overlay" class="winner-overlay">
    <div style="font-size:3rem; color:var(--gold-solid);">👑 CHAMPION</div>
    <p id="winner-msg" style="color:white; margin: 20px 0;"></p>
    <button class="btn" style="max-width:200px" onclick="location.reload()">REMATCH</button>
</div>

<div id="game-screen">
    <div class="score-board">
        <div class="score-box" id="box-opp"><div id="label-opp" style="font-size:0.7rem;">OPPONENT</div><div id="opp-score" class="score-val">0</div></div>
        <div class="score-box" id="box-me"><div style="font-size:0.7rem;">YOU</div><div id="my-score" class="score-val">0</div></div>
    </div>
    <div id="status-msg">Welcome to the table...</div>
    <div class="field">
        <div id="prediction-tag"></div>
        <div class="slot" id="p-slot"></div><div class="slot" id="c-slot"></div>
    </div>
    <div class="btn-group">
        <button id="h-btn" class="btn" onclick="handlePredict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn" onclick="handlePredict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws; let room; let myIndex = 0; let isSolo = false;
    let soloState = { scores: [0, 0], parentIdx: 0, currentPCard: 0 };
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com';

    function toggleManual(show) { document.getElementById('how-to-overlay').style.display = show ? 'block' : 'none'; }

    function startMode(mode) {
        if (mode === 'ONLINE') {
            room = document.getElementById('room-id').value;
            if(!room) return alert("IDを入力してください");
            connect();
        } else {
            isSolo = true; myIndex = 1;
            document.getElementById('label-opp').innerText = "CPU (LV.1)";
            startSoloTurn();
        }
        document.getElementById('bgm').play().catch(()=>{});
        document.getElementById('setup-overlay').style.display = 'none';
    }

    function startSoloTurn() {
        soloState.currentPCard = Math.floor(Math.random() * 52) + 1;
        const role = (soloState.parentIdx === 1) ? "PARENT" : "CHILD";
        autoDealAndFlip({ type: 'TURN', role: role, card: soloState.currentPCard, scores: soloState.scores });
        if (role === "PARENT") {
            setTimeout(() => handlePredict(Math.random() > 0.5 ? "HIGH" : "LOW"), 2500);
        }
    }

    function handleSoloPredict(choice) {
        const pVal = (soloState.currentPCard - 1) % 13 + 1; // A=1, K=13
        const cCard = Math.floor(Math.random() * 52) + 1;
        const cVal = (cCard - 1) % 13 + 1;
        const win = (choice === "HIGH" && cVal > pVal) || (choice === "LOW" && cVal < pVal);
        if (win) soloState.scores[1 - soloState.parentIdx] += 1;
        handleResult({ type: 'RESULT', card: cCard, scores: soloState.scores, win: win, choice: choice });
        if (soloState.scores[0] < 10 && soloState.scores[1] < 10) {
            setTimeout(() => { soloState.parentIdx = 1 - soloState.parentIdx; startSoloTurn(); }, 3000);
        }
    }

    function handlePredict(choice) {
        if (isSolo) { showPredictionTag(choice); handleSoloPredict(choice); }
        else { ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice})); showPredictionTag(choice); }
        document.getElementById('h-btn').disabled = true; document.getElementById('l-btn').disabled = true;
    }

    function connect() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => ws.send(JSON.stringify({type: 'JOIN', room: room}));
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'ASSIGN_ID') myIndex = d.index;
            if (d.type === 'TURN') autoDealAndFlip(d);
            if (d.type === 'RESULT') handleResult(d);
            if (d.type === 'WAITING') document.getElementById('status-msg').innerText = "WAITING FOR OPPONENT...";
        };
    }

    function autoDealAndFlip(d) {
        document.getElementById('prediction-tag').style.display = 'none';
        const isMeChild = (d.role === 'CHILD');
        if (d.scores) {
            document.getElementById('my-score').innerText = d.scores[myIndex];
            document.getElementById('opp-score').innerText = d.scores[1 - myIndex];
            checkWin(d.scores);
        }
        document.getElementById('p-slot').innerHTML = `<div class="card card-back dealing" id="p-card-obj"></div>`;
        document.getElementById('c-slot').innerHTML = `<div class="card card-back dealing"></div>`;
        setTimeout(() => document.querySelectorAll('.card').forEach(c => c.classList.remove('dealing')), 100);
        setTimeout(() => {
            const p = document.getElementById('p-card-obj');
            p.style.transform = "rotateY(90deg)";
            setTimeout(() => {
                p.innerHTML = `<img src="images/png/${getCardFile(d.card)}">`;
                p.classList.remove('card-back'); p.style.transform = "rotateY(0deg)";
                document.getElementById('status-msg').innerText = isMeChild ? "CHOOSE HIGH OR LOW" : "OPPONENT'S TURN...";
                document.getElementById('box-me').className = isMeChild ? 'score-box active' : 'score-box';
                document.getElementById('box-opp').className = isMeChild ? 'score-box' : 'score-box active';
                if (isMeChild) { document.getElementById('h-btn').disabled = false; document.getElementById('l-btn').disabled = false; }
            }, 300);
        }, 800);
    }

    function handleResult(d) {
        document.getElementById('c-slot').innerHTML = `<div class="card"><img src="images/png/${getCardFile(d.card)}"></div>`;
        showPredictionTag(d.choice);
        document.getElementById('status-msg').innerHTML = d.win ? "<span style='color:#00ff00'>MATCH! +1 PT</span>" : "MISS...";
        if (d.win) { document.body.className = 'win-flash'; setTimeout(()=>document.body.className='', 500); }
        if (isSolo) {
            document.getElementById('my-score').innerText = d.scores[myIndex];
            document.getElementById('opp-score').innerText = d.scores[1 - myIndex];
            checkWin(d.scores);
        }
    }

    function showPredictionTag(c) {
        const t = document.getElementById('prediction-tag');
        t.innerText = c; t.style.display = 'block';
        t.style.color = (c === 'HIGH' ? '#ffeb3b' : '#03a9f4');
    }

    function checkWin(s) {
        if (s[myIndex] >= 10) showWinner("YOU"); else if (s[1-myIndex] >= 10) showWinner("OPPONENT");
    }

    function showWinner(w) {
        document.getElementById('winner-overlay').style.display = 'flex';
        document.getElementById('winner-msg').innerText = w === "YOU" ? "おめでとうございます！あなたが支配者です。" : "勝負に敗れました。再挑戦を。";
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const val = (n - 1) % 13 + 1; // A=1, K=13
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suits[Math.floor((n-1)/13)]}.png`;
    }
</script>
</body>
</html>
