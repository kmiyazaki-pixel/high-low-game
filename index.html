<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low Online</title>
    <style>
        :root { --card-w: 28vw; --card-h: 42vw; --gold: #ffd700; }
        @media (min-width: 600px) { :root { --card-w: 120px; --card-h: 180px; } }
        body { font-family: sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        #game-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle, #1b5e20, #071a08); }
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 20px 0; font-size: 1.2rem; color: var(--gold); }
        .field { display: flex; gap: 20px; margin: 20px 0; }
        .slot { width: var(--card-w); height: var(--card-h); border: 2px dashed rgba(255,215,0,0.3); border-radius: 10px; position: relative; }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; transition: 0.6s; transform-style: preserve-3d; }
        .card-back { background: #b71c1c; border: 2px solid #eee; }
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .btn-gold { background: linear-gradient(to bottom, #ffd700, #ffb300); color: #222; }
        .btn:disabled { background: #555; color: #888; }
        .overlay { position: fixed; inset: 0; background: #071a08; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 20px; text-align: center; width: 70%; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:var(--gold)">ROYAL HIGH & LOW</h1>
    <p>URLを共有して同じIDで入室してください</p>
    <input type="text" id="room-id" placeholder="Room ID (例: 777)" inputmode="latin">
    <div class="btn-group">
        <button class="btn btn-gold" onclick="startOnline()">オンライン入室</button>
    </div>
</div>

<div id="game-screen">
    <div class="score-board">
        <div>OPP: <span id="opp-score">0</span></div>
        <div>YOU: <span id="my-score">0</span></div>
    </div>
    <div id="status" style="margin: 10px; font-weight: bold; color: var(--gold);">接続を待機中...</div>
    <div class="field">
        <div class="slot" id="p-slot"></div>
        <div class="slot" id="c-slot"></div>
    </div>
    <div class="btn-group">
        <button id="h-btn" class="btn btn-gold" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn btn-gold" onclick="predict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws;
    let room;

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("IDを入力してください");

        // ★重要: ここに自分のサーバーのURLを入れます
        // テスト用としてGlitchなどの無料WebSocketサーバーが必要です
        ws = new WebSocket('wss://your-poker-server.glitch.me'); 

        ws.onopen = () => {
            ws.send(JSON.stringify({type: 'JOIN', room: room}));
            document.getElementById('setup-overlay').style.display = 'none';
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            handleServerData(data);
        };
    }

    function handleServerData(data) {
        const status = document.getElementById('status');
        if(data.type === 'WAITING') {
            status.innerText = "相手の入室を待っています...";
        } else if(data.type === 'START') {
            status.innerText = "対戦開始！";
        } else if(data.type === 'TURN') {
            // 親のカードを表示し、子が予想する
            renderTurn(data);
        }
    }

    function renderTurn(data) {
        const pSlot = document.getElementById('p-slot');
        const cSlot = document.getElementById('c-slot');
        pSlot.innerHTML = `<div class="card"><img src="images/png/${data.parentCard}.png" width="100%"></div>`;
        cSlot.innerHTML = `<div class="card card-back"></div>`;

        if(data.role === 'CHILD') {
            document.getElementById('status').innerText = "あなたの番です (HIGH か LOW)";
            document.getElementById('h-btn').disabled = false;
            document.getElementById('l-btn').disabled = false;
        } else {
            document.getElementById('status').innerText = "相手が予想中...";
        }
    }

    function predict(choice) {
        ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
        document.getElementById('h-btn').disabled = true;
        document.getElementById('l-btn').disabled = true;
    }

    // カード画像ファイル名の取得用
    function getCardFile(id) {
        // (以前のロジックと同じ)
    }
</script>
</body>
</html>
