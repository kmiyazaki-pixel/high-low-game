<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>High & Low Game</title>
    <style>
        body { background-color: #2d5a27; color: white; font-family: sans-serif; text-align: center; }
        .game-container { max-width: 600px; margin: auto; padding: 20px; border: 5px solid #3e2723; border-radius: 15px; background: #35652d; }
        .card-area { display: flex; justify-content: space-around; margin: 20px 0; }
        .card { width: 100px; height: 140px; background: white; border-radius: 8px; color: black; line-height: 140px; font-size: 24px; font-weight: bold; border: 2px solid #000; }
        .card.back { background: #b71c1c; color: #b71c1c; } /* 裏向き */
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        .score { font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>High & Low</h1>
    <div class="game-container">
        <div id="turn-info">Player 1の親番です</div>
        <div class="card-area">
            <div>
                <p>親のカード (表)</p>
                <div id="parent-card" class="card">?</div>
            </div>
            <div>
                <p>子のカード (裏)</p>
                <div id="child-card" class="card back">?</div>
            </div>
        </div>
        <div class="controls">
            <button onclick="guess('HIGH')">HIGH (大きい)</button>
            <button onclick="guess('LOW')">LOW (小さい)</button>
        </div>
        <div id="result-msg"></div>
        <div class="score">
            P1獲得: <span id="p1-score">0</span> | P2獲得: <span id="p2-score">0</span>
        </div>
        <div id="deck-count">残り枚数: 52</div>
    </div>

    <script>
        async function guess(prediction) {
            const response = await fetch('/api/play', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prediction: prediction })
            });
            const data = await response.json();
            
            // 結果の反映
            document.getElementById('parent-card').innerText = data.parentCard;
            document.getElementById('child-card').innerText = data.childCard;
            document.getElementById('child-card').classList.remove('back');
            document.getElementById('result-msg').innerText = data.message;
            document.getElementById('p1-score').innerText = data.p1Score;
            document.getElementById('p2-score').innerText = data.p2Score;
            document.getElementById('deck-count').innerText = "残り枚数: " + data.remaining;
            document.getElementById('turn-info').innerText = data.nextTurn;

            // 次のターンへ（少し遅延させてリセット）
            if(data.remaining > 0) {
                setTimeout(resetTable, 2000);
            } else {
                alert("ゲーム終了！勝者: " + data.winner);
            }
        }

        function resetTable() {
            document.getElementById('parent-card').innerText = "?";
            document.getElementById('child-card').innerText = "?";
            document.getElementById('child-card').classList.add('back');
            document.getElementById('result-msg').innerText = "";
        }
    </script>
</body>
</html>
