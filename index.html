<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low - Strategy Edition</title>
    <style>
        :root { 
            --card-w: 28vw; --card-h: 42vw; 
            --gold: linear-gradient(135deg, #f9d423 0%, #ffdb6e 50%, #b8860b 100%);
            --gold-solid: #ffd700;
            --dark-green: radial-gradient(circle, #1b5e20 0%, #051a05 100%);
            --glass: rgba(255, 255, 255, 0.1);
        }
        @media (min-width: 600px) { :root { --card-w: 140px; --card-h: 200px; } }

        body { font-family: 'Georgia', serif; background: var(--dark-green); color: white; margin: 0; overflow: hidden; text-align: center; }

        /* ヘッダー：状況ガイド */
        .game-header { background: rgba(0,0,0,0.8); padding: 10px; border-bottom: 2px solid #b8860b; }
        .phase-indicator { font-size: 0.7rem; letter-spacing: 3px; color: var(--gold-solid); margin-bottom: 5px; opacity: 0.8; }
        
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 10px 0; }
        .score-box { flex: 1; border: 1px solid transparent; border-radius: 10px; padding: 5px; transition: 0.4s; }
        .score-box.active { background: var(--glass); border-color: var(--gold-solid); box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .score-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        .score-val { font-size: 1.8rem; font-weight: bold; }

        /* メインステージ */
        #status-msg { margin: 15px 10px; font-size: 1.1rem; height: 3.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .rule-hint { font-size: 0.8rem; color: #ccc; font-style: italic; margin-top: 4px; }

        .field { display: flex; gap: 20px; margin: 10px 0; justify-content: center; position: relative; }
        .slot { width: var(--card-w); height: var(--card-h); border: 1px solid rgba(184, 134, 11, 0.4); border-radius: 12px; position: relative; background: rgba(0,0,0,0.3); }
        
        /* 予想タグ（可視化） */
        #prediction-tag { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 50; padding: 10px 20px; border-radius: 50px; font-weight: bold;
            font-size: 1.2rem; display: none; background: rgba(0,0,0,0.8); border: 2px solid var(--gold-solid);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(184, 134, 11, 0.6); overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-back { background: #8b0000; border: 2px solid #ffd700; background-image: repeating-linear-gradient(45deg, #8b0000, #8b0000 10px, #a52a2a 10px, #a52a2a 20px); }

        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 400px; margin: 20px auto; }
        .btn { flex: 1; padding: 18px; border-radius: 8px; border: 1px solid #b8860b; font-size: 1.3rem; font-weight: bold; cursor: pointer; background: var(--gold); color: #222; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn:disabled { background: #333; color: #666; border-color: #444; }

        /* エフェクト */
        @keyframes flash-green { 0% { background: var(--dark-green); } 50% { background: #1b5e20; } 100% { background: var(--dark-green); } }
        .win-flash { animation: flash-green 0.5s ease-in-out; }

        .overlay { position: fixed; inset: 0; background: #051a05; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: 2px solid #b8860b; background: #111; color: white; text-align: center; margin-bottom: 20px; width: 70%; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:#ffd700; font-size: 2rem; letter-spacing: 4px;">ROYAL CASINO</h1>
    <input type="text" id="room-id" placeholder="ROOM ID" inputmode="latin">
    <div class="btn-group">
        <button class="btn" onclick="startOnline()">JOIN TABLE</button>
    </div>
</div>

<div id="game-screen">
    <div class="game-header">
        <div class="phase-indicator" id="phase-text">INITIALIZING...</div>
        <div class="score-board">
            <div class="score-box" id="box-opp">
                <div class="score-label">Opponent</div>
                <div id="opp-score" class="score-val">0</div>
            </div>
            <div class="score-box" id="box-me">
                <div class="score-label">You</div>
                <div id="my-score" class="score-val">0</div>
            </div>
        </div>
    </div>
    
    <div id="status-msg">
        <div id="main-text">Connecting to Server...</div>
        <div id="sub-text" class="rule-hint">Please wait a moment</div>
    </div>

    <div class="field">
        <div id="prediction-tag">HIGH</div>
        <div class="slot" id="p-slot-container"></div>
        <div class="slot" id="c-slot-container"></div>
    </div>

    <div class="btn-group">
        <button id="h-btn" class="btn" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn" onclick="predict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws;
    let room;
    let myPlayerIndex = -1;
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com';

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("IDを入力してください");
        connect();
        document.getElementById('setup-overlay').style.display = 'none';
    }

    function connect() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => ws.send(JSON.stringify({type: 'JOIN', room: room}));
        ws.onmessage = (e) => handleServerData(JSON.parse(e.data));
        ws.onclose = () => {
            document.getElementById('main-text').innerText = "Connection lost...";
            setTimeout(connect, 3000);
        };
    }

    function handleServerData(data) {
        if (data.scores && myPlayerIndex !== -1) {
            document.getElementById('my-score').innerText = data.scores[myPlayerIndex];
            document.getElementById('opp-score').innerText = data.scores[1 - myPlayerIndex];
        }

        switch(data.type) {
            case 'ASSIGN_ID':
                myPlayerIndex = data.index;
                break;
            case 'WAITING':
                setInfo("WAITING", "Waiting for opponent...", "Share Room ID: " + room);
                break;
            case 'START':
                setInfo("READY", "Opponent Joined!", "Get ready for the first draw...");
                break;
            case 'TURN':
                handleTurn(data);
                break;
            case 'RESULT':
                handleResult(data);
                break;
        }
    }

    function setInfo(phase, main, sub) {
        document.getElementById('phase-text').innerText = phase;
        document.getElementById('main-text').innerText = main;
        document.getElementById('sub-text').innerText = sub;
    }

    function handleTurn(data) {
        // 表示のリセット
        document.getElementById('prediction-tag').style.display = 'none';
        
        const pSlot = document.getElementById('p-slot-container');
        const cSlot = document.getElementById('c-slot-container');
        pSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        cSlot.innerHTML = `<div class="card card-back"></div>`;

        if(data.role === 'CHILD') {
            setInfo("YOUR PREDICTION", "High or Low?", "Predict if your card is higher than the Parent's.");
            document.getElementById('h-btn').disabled = false;
            document.getElementById('l-btn').disabled = false;
            document.getElementById('box-me').classList.add('active');
            document.getElementById('box-opp').classList.remove('active');
        } else {
            setInfo("OPPONENT PREDICTING", "Opponent's Turn", "The opponent is choosing their bet...");
            document.getElementById('h-btn').disabled = true;
            document.getElementById('l-btn').disabled = true;
            document.getElementById('box-opp').classList.add('active');
            document.getElementById('box-me').classList.remove('active');
        }
    }

    function predict(choice) {
        ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
        document.getElementById('h-btn').disabled = true;
        document.getElementById('l-btn').disabled = true;
        
        // 自分の予想を可視化
        const tag = document.getElementById('prediction-tag');
        tag.innerText = choice;
        tag.style.display = 'block';
        tag.style.color = (choice === 'HIGH') ? '#ffeb3b' : '#03a9f4';
    }

    function handleResult(data) {
        const cSlot = document.getElementById('c-slot-container');
        cSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        
        // 相手の予想も可視化
        const tag = document.getElementById('prediction-tag');
        tag.innerText = data.choice;
        tag.style.display = 'block';
        tag.style.color = (data.choice === 'HIGH') ? '#ffeb3b' : '#03a9f4';

        if (data.win) {
            setInfo("RESULT", "MATCH!", "Prediction was correct! +2 Points");
            document.body.classList.add('win-flash');
            setTimeout(() => document.body.classList.remove('win-flash'), 500);
        } else {
            setInfo("RESULT", "MISS", "Better luck next time...");
        }
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suit}.png`;
    }
</script>
</body>
</html>
