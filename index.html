<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low Online - Stable</title>
    <style>
        :root { --card-w: 28vw; --card-h: 42vw; --gold: #ffd700; }
        @media (min-width: 600px) { :root { --card-w: 130px; --card-h: 190px; } }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        #game-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle, #1b5e20, #071a08); }
        
        /* スコアエリア */
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 15px 0; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--gold); }
        .score-box { flex: 1; }
        .score-label { font-size: 0.8rem; color: #aaa; }
        .score-val { font-size: 1.5rem; font-weight: 900; color: var(--gold); }

        #status { margin: 15px 10px; font-weight: bold; color: var(--gold); height: 3.5rem; display: flex; align-items: center; justify-content: center; line-height: 1.2; }

        .field { display: flex; gap: 20px; margin: 10px 0; }
        .slot { width: var(--card-w); height: var(--card-h); border: 2px dashed rgba(255,215,0,0.2); border-radius: 12px; position: relative; }
        .slot-tag { position: absolute; top: -25px; width: 100%; font-size: 0.7rem; color: #888; }

        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .card-back { background: #b71c1c; border: 2px solid #eee; background-image: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 5px, #d32f2f 5px, #d32f2f 10px); }
        
        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 400px; margin-top: 10px; }
        .btn { flex: 1; padding: 18px; border-radius: 50px; border: none; font-size: 1.3rem; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ffb300); color: #222; }
        .btn:disabled { background: #444 !important; color: #777; transform: none; box-shadow: none; }

        .overlay { position: fixed; inset: 0; background: #071a08; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 25px; text-align: center; width: 75%; background: #111; color: white; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:var(--gold); letter-spacing: 5px; font-size: 2rem;">ROYAL<br>HIGH & LOW</h1>
    <p style="color: #888; margin-bottom: 30px;">Enter Room ID to play</p>
    <input type="text" id="room-id" placeholder="Room ID" inputmode="latin">
    <div class="btn-group">
        <button class="btn btn-gold" onclick="startOnline()">ENTER ROOM</button>
    </div>
</div>

<div id="game-screen">
    <div class="score-board">
        <div class="score-box">
            <div class="score-label">OPPONENT</div>
            <div id="opp-score" class="score-val">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">YOU</div>
            <div id="my-score" class="score-val">0</div>
        </div>
    </div>
    
    <div id="status">Connecting to server...</div>

    <div class="field">
        <div class="slot">
            <div class="slot-tag">PARENT (親)</div>
            <div id="p-slot"></div>
        </div>
        <div class="slot">
            <div class="slot-tag">CHILD (子)</div>
            <div id="c-slot"></div>
        </div>
    </div>

    <div class="btn-group">
        <button id="h-btn" class="btn btn-gold" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn btn-gold" onclick="predict('LOW')" disabled>LOW</button>
    </div>
    
    <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">Render Online Server: Active</p>
</div>

<script>
    let ws;
    let room;
    let myIndex = -1; // サーバーが割り当てるプレイヤー番号(0 or 1)
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com';

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("IDを入力してください");

        document.getElementById('status').innerText = "Establishing connection...";
        ws = new WebSocket(SERVER_URL);

        ws.onopen = () => {
            ws.send(JSON.stringify({type: 'JOIN', room: room}));
            document.getElementById('setup-overlay').style.display = 'none';
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            handleServerData(data);
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = "Disconnected. Reconnecting...";
            setTimeout(startOnline, 3000); // 3秒後に再接続試行
        };
    }

    function handleServerData(data) {
        const status = document.getElementById('status');
        
        switch(data.type) {
            case 'WAITING':
                status.innerText = "Waiting for an opponent...\nShare Room ID: " + room;
                break;
                
            case 'START':
                status.innerText = "Opponent joined! Game starting...";
                break;
                
            case 'TURN':
                // 自分がPlayer 0か1かを最初に覚える
                if(myIndex === -1) {
                    // サーバーがroleを送ってくる際の判別ロジック（初回のみ設定）
                    // 実際はサーバー側で"PLAYER_INDEX"を送るのが理想ですが、
                    // 現状の構成ではroleを受け取った時点で判定します。
                }
                updateScores(data.scores);
                renderTurn(data);
                break;
                
            case 'RESULT':
                updateScores(data.scores);
                revealResult(data);
                break;
        }
    }

    function renderTurn(data) {
        const pSlot = document.getElementById('p-slot');
        const cSlot = document.getElementById('c-slot');
        
        // 親のカードを表示
        pSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}" width="100%" style="border-radius:10px;"></div>`;
        // 子のカードは裏向き
        cSlot.innerHTML = `<div class="card card-back"></div>`;

        if(data.role === 'CHILD') {
            document.getElementById('status').innerHTML = "YOUR TURN!<br>Is your card High or Low?";
            document.getElementById('h-btn').disabled = false;
            document.getElementById('l-btn').disabled = false;
            // 触覚フィードバック（スマホのみ）
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        } else {
            document.getElementById('status').innerText = "PARENT ROLE\nWaiting for opponent's prediction...";
            document.getElementById('h-btn').disabled = true;
            document.getElementById('l-btn').disabled = true;
        }
    }

    function predict(choice) {
        ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
        document.getElementById('h-btn').disabled = true;
        document.getElementById('l-btn').disabled = true;
        document.getElementById('status').innerText = "Checking...";
    }

    function revealResult(data) {
        const cSlot = document.getElementById('c-slot');
        // 子のカードをめくる
        cSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}" width="100%" style="border-radius:10px;"></div>`;
        
        const status = document.getElementById('status');
        if(data.win) {
            status.innerHTML = "<span style='color:#00ff00'>MATCH! +2 POINTS</span>";
        } else {
            status.innerHTML = "<span style='color:#ff4444'>MISS...</span>";
        }
    }

    function updateScores(scores) {
        if(!scores) return;
        // サーバーが[Player1Score, Player2Score]を送ってくる想定
        // 自分がどちらかは最初のターンのroleで判定（簡易版）
        if(myIndex === -1) {
            // roleが送られてきた時、自分がどちらか固定する仕組みが必要ですが、
            // 今回は便宜上、左をPlayer0, 右をPlayer1として描画します。
        }
        // ここでは暫定的に、scores[0]と[1]を表示
        document.getElementById('opp-score').innerText = scores[0];
        document.getElementById('my-score').innerText = scores[1];
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        const valName = names[val] || val;
        return `${valName}_of_${suit}.png`;
    }
</script>
</body>
</html>
