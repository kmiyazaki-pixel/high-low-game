<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Royal High & Low - Online</title>
    <style>
        :root { --card-w: 120px; --card-h: 180px; --gold: #ffd700; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        #game-screen { display: flex; flex-direction: column; align-items: center; height: 100vh; background: radial-gradient(circle at center, #1b5e20 0%, #071a08 100%); }
        
        #score-board { display: flex; justify-content: space-around; width: 100%; padding: 20px; font-size: 1.5rem; font-weight: 900; color: var(--gold); }
        #status-bar { font-size: 2rem; font-weight: 900; color: var(--gold); margin: 20px 0; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }

        #field { display: flex; gap: 50px; height: 250px; align-items: center; justify-content: center; margin: 30px 0; }
        .slot { width: var(--card-w); height: var(--card-h); border: 2px dashed rgba(255,215,0,0.3); border-radius: 12px; position: relative; }
        
        .card-wrapper { position: absolute; width: var(--card-w); height: var(--card-h); border-radius: 12px; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .card-back { background: #b71c1c; border: 3px solid #eee; background-image: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 10px, #d32f2f 10px, #d32f2f 20px); }

        .get-anim { transform: translateY(500px) scale(0.2) rotate(360deg) !important; opacity: 0; transition: 0.8s ease-in !important; }
        .lose-anim { transform: translateY(-500px) scale(0.2) !important; opacity: 0; transition: 0.8s ease-in !important; }

        .draw-btn { background: linear-gradient(135deg, #ffd700, #ffb300); color: #222; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.5rem; cursor: pointer; font-weight: 900; box-shadow: 0 6px 20px rgba(0,0,0,0.4); margin: 10px; }
        .overlay { position: fixed; inset: 0; background: #071a08; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: white; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<audio id="bgm" src="jazz.mp3" loop></audio>

<div id="mode-overlay" class="overlay">
    <h1 style="color:var(--gold); font-size: 3rem; letter-spacing: 5px; margin-bottom: 30px;">ROYAL HIGH & LOW</h1>
    <input type="text" id="room-input" placeholder="Room IDを入力">
    <div style="display: flex; gap: 10px;">
        <button class="draw-btn" onclick="connect('online')">入室する</button>
        <button class="draw-btn" style="background: #444; color: white;" onclick="connect('cpu')">CPU対戦</button>
    </div>
</div>

<div id="game-screen">
    <div id="score-board">
        <div>OPPONENT: <span id="opp-score">0</span> pts</div>
        <div>YOU: <span id="my-score">0</span> pts</div>
    </div>
    <div id="status-bar">対戦相手を待っています...</div>

    <div id="field">
        <div class="slot" id="parent-slot"></div>
        <div class="slot" id="child-slot"></div>
    </div>

    <div id="control-panel">
        <button id="high-btn" class="draw-btn" onclick="sendChoice('HIGH')" disabled>HIGH</button>
        <button id="low-btn" class="draw-btn" onclick="sendChoice('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let socket, myId, isParent, animating = false;
    let scores = { me: 0, opp: 0 };

    function connect(mode) {
        const rid = document.getElementById('room-input').value;
        if (mode === 'online' && !rid) { alert("Room IDを入力してください"); return; }
        
        document.getElementById('mode-overlay').style.display = 'none';
        document.getElementById('bgm').play().catch(()=>{});

        if (mode === 'cpu') {
            startCPUMode();
        } else {
            // サーバーURLは適宜変更してください
            socket = new WebSocket('wss://your-highlow-server.com');
            socket.onopen = () => socket.send(`JOIN|${rid}`);
            socket.onmessage = handleMessage;
        }
    }

    function handleMessage(e) {
        const [cmd, p1, p2, p3, p4] = e.data.split('|');
        
        switch(cmd) {
            case 'START':
                document.getElementById('status-bar').innerText = "ゲーム開始！";
                break;
            case 'TURN': // TURN | Role(PARENT/CHILD) | ParentCardID | MyScore | OppScore
                isParent = (p1 === 'PARENT');
                scores.me = p3; scores.opp = p4;
                updateScores();
                setupTurn(p1, parseInt(p2));
                break;
            case 'RESULT': // RESULT | ChildCardID | WinStatus(WIN/LOSE)
                revealResult(parseInt(p1), p2);
                break;
        }
    }

    function setupTurn(role, pCardId) {
        const status = document.getElementById('status-bar');
        const pSlot = document.getElementById('parent-slot');
        const cSlot = document.getElementById('child-slot');
        
        pSlot.innerHTML = ''; cSlot.innerHTML = '';
        
        // 親のカードを表示
        const pCard = createCardEl(pCardId, true);
        pSlot.appendChild(pCard);

        // 子のカード（裏向き）を表示
        const cCard = createCardEl(null, false);
        cSlot.appendChild(cCard);

        if (role === 'CHILD') {
            status.innerText = "あなたの番です！予想してください";
            document.getElementById('high-btn').disabled = false;
            document.getElementById('low-btn').disabled = false;
        } else {
            status.innerText = "相手が予想しています...";
        }
    }

    function sendChoice(choice) {
        document.getElementById('high-btn').disabled = true;
        document.getElementById('low-btn').disabled = true;
        socket.send(`PREDICT|${choice}`);
    }

    function revealResult(cCardId, statusText) {
        animating = true;
        const cSlot = document.getElementById('child-slot');
        const cCard = cSlot.querySelector('.card-wrapper');
        
        // 子のカードをめくる演出
        cCard.classList.remove('card-back');
        cCard.innerHTML = `<img src="images/png/${getCardFile(cCardId)}" style="width:100%;height:100%;border-radius:10px;">`;
        cCard.style.transform = "rotateY(180deg)";

        setTimeout(() => {
            const isWin = (statusText === 'WIN');
            const pCard = document.getElementById('parent-slot').querySelector('.card-wrapper');
            
            if (isWin) {
                // 当たった場合はスコアの方へ飛ぶ
                const targetClass = isParent ? 'lose-anim' : 'get-anim';
                pCard.classList.add(targetClass);
                cCard.classList.add(targetClass);
            } else {
                pCard.classList.add('lose-anim');
                cCard.classList.add('lose-anim');
            }
            animating = false;
        }, 1500);
    }

    function updateScores() {
        document.getElementById('my-score').innerText = scores.me;
        document.getElementById('opp-score').innerText = scores.opp;
    }

    function createCardEl(id, isFront) {
        const el = document.createElement('div');
        el.className = `card-wrapper ${isFront ? '' : 'card-back'}`;
        if (isFront) el.innerHTML = `<img src="images/png/${getCardFile(id)}" style="width:100%;height:100%;border-radius:10px;">`;
        return el;
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suit}.png`;
    }
</script>
</body>
</html>
