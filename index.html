<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low Online</title>
    <style>
        :root { --card-w: 28vw; --card-h: 42vw; --gold: #ffd700; }
        @media (min-width: 600px) { :root { --card-w: 120px; --card-h: 180px; } }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #071a08; color: white; margin: 0; overflow: hidden; text-align: center; }
        #game-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; background: radial-gradient(circle, #1b5e20, #071a08); }
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 20px 0; font-size: 1.2rem; color: var(--gold); font-weight: bold; }
        .field { display: flex; gap: 20px; margin: 20px 0; }
        .slot { width: var(--card-w); height: var(--card-h); border: 2px dashed rgba(255,215,0,0.3); border-radius: 10px; position: relative; }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; transition: 0.6s; transform-style: preserve-3d; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card-back { background: #b71c1c; border: 2px solid #eee; background-image: repeating-linear-gradient(45deg, #b71c1c, #b71c1c 5px, #d32f2f 5px, #d32f2f 10px); }
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: linear-gradient(to bottom, #ffd700, #ffb300); color: #222; }
        .btn-gold:active { transform: scale(0.95); }
        .btn:disabled { background: #555 !important; color: #888; transform: none; }
        .overlay { position: fixed; inset: 0; background: #071a08; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 20px; text-align: center; width: 70%; background: #111; color: white; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:var(--gold); letter-spacing: 5px;">ROYAL HIGH & LOW</h1>
    <p>Room IDを入力して対戦を開始</p>
    <input type="text" id="room-id" placeholder="Room ID (例: 777)" inputmode="latin">
    <div class="btn-group">
        <button class="btn btn-gold" onclick="startOnline()">オンライン入室</button>
    </div>
    <p style="font-size: 0.8rem; color: #888; margin-top: 30px;">※Renderの無料プランは起動に1分ほどかかる場合があります</p>
</div>

<div id="game-screen">
    <div class="score-board">
        <div>OPP: <span id="opp-score">0</span></div>
        <div>YOU: <span id="my-score">0</span></div>
    </div>
    <div id="status" style="margin: 10px; font-weight: bold; color: var(--gold); height: 3em;">接続中...</div>
    <div class="field">
        <div class="slot" id="p-slot"></div>
        <div class="slot" id="c-slot"></div>
    </div>
    <div class="btn-group">
        <button id="h-btn" class="btn btn-gold" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn btn-gold" onclick="predict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws;
    let room;
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com'; // あなたのURLに設定済み

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("Room IDを入力してください");

        document.getElementById('status').innerText = "サーバーに接続しています...";
        ws = new WebSocket(SERVER_URL);

        ws.onopen = () => {
            ws.send(JSON.stringify({type: 'JOIN', room: room}));
            document.getElementById('setup-overlay').style.display = 'none';
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            handleServerData(data);
        };

        ws.onclose = () => {
            alert("サーバーとの接続が切れました。ページをリロードしてください。");
            location.reload();
        };

        ws.onerror = (err) => {
            alert("サーバーがまだ起動していないか、接続エラーが発生しました。1分待ってから再度お試しください。");
        };
    }

    function handleServerData(data) {
        const status = document.getElementById('status');
        if(data.type === 'WAITING') {
            status.innerText = "相手の入室を待っています（同じIDを入れてもらってください）";
        } else if(data.type === 'START') {
            status.innerText = "対戦相手が見つかりました！";
        } else if(data.type === 'TURN') {
            renderTurn(data);
        } else if(data.type === 'RESULT') {
            revealResult(data);
        }
    }

    function renderTurn(data) {
        const pSlot = document.getElementById('p-slot');
        const cSlot = document.getElementById('c-slot');
        // 親のカードを表示
        pSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}" width="100%" style="border-radius:10px;"></div>`;
        // 子のカードは裏向き
        cSlot.innerHTML = `<div class="card card-back"></div>`;

        if(data.role === 'CHILD') {
            document.getElementById('status').innerText = "あなたの番です！親より HIGH か LOW か？";
            document.getElementById('h-btn').disabled = false;
            document.getElementById('l-btn').disabled = false;
        } else {
            document.getElementById('status').innerText = "相手の予想を待っています...";
        }
    }

    function predict(choice) {
        ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
        document.getElementById('h-btn').disabled = true;
        document.getElementById('l-btn').disabled = true;
    }

    function revealResult(data) {
        const cSlot = document.getElementById('c-slot');
        // 子のカードをオープン
        cSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}" width="100%" style="border-radius:10px;"></div>`;
        document.getElementById('status').innerText = "結果: " + (data.choice === "HIGH" ? "高い" : "低い") + " と予想しました";
        
        // 次のターンへ（サーバーから自動的に送られてくる想定）
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        const valName = names[val] || val;
        return `${valName}_of_${suit}.png`;
    }
</script>
</body>
</html>
