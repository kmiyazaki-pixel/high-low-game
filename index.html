<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low - Luxury Edition</title>
    <style>
        :root { 
            --card-w: 28vw; --card-h: 42vw; 
            --gold: linear-gradient(135deg, #f9d423 0%, #ffdb6e 50%, #b8860b 100%);
            --gold-solid: #ffd700;
            --dark-green: radial-gradient(circle, #1b5e20 0%, #051a05 100%);
        }
        @media (min-width: 600px) { :root { --card-w: 140px; --card-h: 200px; } }

        body { font-family: 'Georgia', serif; background: var(--dark-green); color: white; margin: 0; overflow: hidden; text-align: center; }

        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 20px 0; background: rgba(0,0,0,0.6); border-bottom: 2px solid #b8860b; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .score-box { flex: 1; transition: 0.3s; opacity: 0.6; }
        .score-box.active { opacity: 1; transform: scale(1.1); color: var(--gold-solid); }
        .score-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
        .score-val { font-size: 2.2rem; font-weight: bold; }

        #status { margin: 20px 10px; font-size: 1.1rem; font-weight: bold; height: 3rem; color: var(--gold-solid); display: flex; align-items: center; justify-content: center; text-shadow: 0 0 10px rgba(255,215,0,0.5); }

        .field { display: flex; gap: 20px; margin: 10px 0; justify-content: center; }
        .slot { width: var(--card-w); height: var(--card-h); border: 1px solid rgba(184, 134, 11, 0.4); border-radius: 12px; position: relative; background: rgba(0,0,0,0.3); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(184, 134, 11, 0.6); overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-back { background: #8b0000; border: 2px solid #ffd700; background-image: repeating-linear-gradient(45deg, #8b0000, #8b0000 10px, #a52a2a 10px, #a52a2a 20px); }

        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 400px; margin: 20px auto; }
        .btn { flex: 1; padding: 18px; border-radius: 8px; border: 1px solid #b8860b; font-size: 1.3rem; font-weight: bold; cursor: pointer; background: var(--gold); color: #222; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }
        .btn:disabled { background: #333; color: #666; border-color: #444; box-shadow: none; }
        .btn:disabled::after { display: none; }

        .overlay { position: fixed; inset: 0; background: #051a05; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: 2px solid #b8860b; background: #111; color: white; text-align: center; margin-bottom: 20px; width: 70%; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:#ffd700; font-size: 2.5rem; letter-spacing: 4px;">ROYAL CASINO</h1>
    <p style="color: #888; margin-bottom: 20px;">HIGH & LOW ONLINE</p>
    <input type="text" id="room-id" placeholder="ROOM ID" inputmode="latin">
    <div class="btn-group">
        <button class="btn" onclick="startOnline()">JOIN TABLE</button>
    </div>
</div>

<div id="game-screen">
    <div class="score-board">
        <div class="score-box" id="box-opp">
            <div class="score-label">Opponent</div>
            <div id="opp-score" class="score-val">0</div>
        </div>
        <div class="score-box" id="box-me">
            <div class="score-label">You</div>
            <div id="my-score" class="score-val">0</div>
        </div>
    </div>
    
    <div id="status">Establishing connection...</div>

    <div class="field">
        <div class="slot"><div id="p-slot"></div></div>
        <div class="slot"><div id="c-slot"></div></div>
    </div>

    <div class="btn-group">
        <button id="h-btn" class="btn" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn" onclick="predict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws;
    let room;
    let myPlayerIndex = -1; 
    let pingInterval;
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com';

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("IDを入力してください");
        connect();
        document.getElementById('setup-overlay').style.display = 'none';
    }

    function connect() {
        if(ws) ws.close();
        ws = new WebSocket(SERVER_URL);

        ws.onopen = () => {
            ws.send(JSON.stringify({type: 'JOIN', room: room}));
            if(pingInterval) clearInterval(pingInterval);
            pingInterval = setInterval(() => {
                if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'PING'}));
            }, 25000);
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            handleServerData(data);
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = "Connection lost. Reconnecting...";
            setTimeout(connect, 3000);
        };
    }

    function handleServerData(data) {
        // スコア同期ロジック (常に最新のスコアを反映)
        if (data.scores && myPlayerIndex !== -1) {
            document.getElementById('my-score').innerText = data.scores[myPlayerIndex];
            document.getElementById('opp-score').innerText = data.scores[1 - myPlayerIndex];
        }

        switch(data.type) {
            case 'ASSIGN_ID':
                myPlayerIndex = data.index;
                console.log("Joined as Player Index:", myPlayerIndex);
                break;
            case 'TURN':
                renderTurn(data);
                break;
            case 'RESULT':
                revealResult(data);
                break;
            case 'WAITING':
                document.getElementById('status').innerText = "WAITING FOR OPPONENT...";
                break;
            case 'START':
                document.getElementById('status').innerText = "GAME START!";
                break;
        }
    }

    function renderTurn(data) {
        const pSlot = document.getElementById('p-slot');
        const cSlot = document.getElementById('c-slot');
        const status = document.getElementById('status');

        pSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        cSlot.innerHTML = `<div class="card card-back"></div>`;

        if(data.role === 'CHILD') {
            status.innerText = "YOUR TURN: HIGH OR LOW?";
            document.getElementById('h-btn').disabled = false;
            document.getElementById('l-btn').disabled = false;
            document.getElementById('box-me').classList.add('active');
            document.getElementById('box-opp').classList.remove('active');
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        } else {
            status.innerText = "OPPONENT'S TURN...";
            document.getElementById('h-btn').disabled = true;
            document.getElementById('l-btn').disabled = true;
            document.getElementById('box-opp').classList.add('active');
            document.getElementById('box-me').classList.remove('active');
        }
    }

    function revealResult(data) {
        const cSlot = document.getElementById('c-slot');
        cSlot.innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        
        const status = document.getElementById('status');
        if (data.win) {
            status.innerHTML = "<span style='color:#00ff00'>MATCH! +2 PTS</span>";
        } else {
            status.innerHTML = "<span style='color:#ff4444'>MISS...</span>";
        }
    }

    function predict(choice) {
        if(ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
            document.getElementById('h-btn').disabled = true;
            document.getElementById('l-btn').disabled = true;
        }
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suit}.png`;
    }
</script>
</body>
</html>
