<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal High & Low - Final Edition</title>
    <style>
        :root { 
            --card-w: 28vw; --card-h: 42vw; 
            --gold: linear-gradient(135deg, #f9d423 0%, #ffdb6e 50%, #b8860b 100%);
            --gold-solid: #ffd700;
            --dark-green: radial-gradient(circle, #1b5e20 0%, #051a05 100%);
        }
        @media (min-width: 600px) { :root { --card-w: 140px; --card-h: 200px; } }
        body { font-family: 'Georgia', serif; background: var(--dark-green); color: white; margin: 0; overflow: hidden; text-align: center; }
        .score-board { display: flex; justify-content: space-around; width: 100%; padding: 15px 0; background: rgba(0,0,0,0.7); border-bottom: 2px solid #b8860b; }
        .score-box { flex: 1; transition: 0.4s; opacity: 0.5; }
        .score-box.active { opacity: 1; transform: scale(1.1); color: var(--gold-solid); }
        .score-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        .score-val { font-size: 2rem; font-weight: bold; }
        #status-msg { margin: 15px 10px; font-size: 1.1rem; height: 3.5rem; color: var(--gold-solid); }
        .field { display: flex; gap: 20px; margin: 10px 0; justify-content: center; position: relative; }
        .slot { width: var(--card-w); height: var(--card-h); border: 1px solid rgba(184, 134, 11, 0.4); border-radius: 12px; position: relative; background: rgba(0,0,0,0.3); }
        #prediction-tag { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; display: none; background: rgba(0,0,0,0.8); border: 2px solid var(--gold-solid); }
        .card { position: absolute; width: 100%; height: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(184, 134, 11, 0.6); overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-back { background: #8b0000; border: 2px solid #ffd700; background-image: repeating-linear-gradient(45deg, #8b0000, #8b0000 10px, #a52a2a 10px, #a52a2a 20px); }
        .btn-group { display: flex; gap: 15px; width: 90%; max-width: 400px; margin: 20px auto; }
        .btn { flex: 1; padding: 18px; border-radius: 8px; border: 1px solid #b8860b; font-size: 1.3rem; font-weight: bold; background: var(--gold); color: #222; cursor: pointer; position: relative; overflow: hidden; }
        .btn:disabled { background: #333; color: #666; border-color: #444; }
        .overlay, .winner-overlay, .fled-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .overlay { background: #051a05; }
        .winner-overlay { background: rgba(0,0,0,0.95); display: none; }
        .fled-overlay { background: rgba(139, 0, 0, 0.95); display: none; }
        .winner-text { font-size: 3rem; color: var(--gold-solid); text-shadow: 0 0 20px #ffb300; margin-bottom: 20px; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: 2px solid #b8860b; background: #111; color: white; text-align: center; margin-bottom: 20px; width: 70%; }
        @keyframes flash { 0% { background: var(--dark-green); } 50% { background: #1b5e20; } 100% { background: var(--dark-green); } }
        .win-flash { animation: flash 0.5s; }
    </style>
</head>
<body>

<div id="setup-overlay" class="overlay">
    <h1 style="color:#ffd700; font-size: 2.5rem; letter-spacing: 4px;">ROYAL CASINO</h1>
    <input type="text" id="room-id" placeholder="ROOM ID" inputmode="latin">
    <div class="btn-group"><button class="btn" onclick="startOnline()">JOIN TABLE</button></div>
</div>

<div id="fled-overlay" class="fled-overlay">
    <h1 style="color:white;">OPPONENT FLED!</h1>
    <p>相手が戦場から逃げ出しました。</p>
    <button class="btn" style="width:200px" onclick="location.reload()">REMATCH</button>
</div>

<div id="winner-overlay" class="winner-overlay">
    <div class="winner-text">👑 CHAMPION</div>
    <p id="winner-msg" style="color:white; font-size: 1.2rem;"></p>
    <button class="btn" style="width:200px" onclick="location.reload()">NEW TABLE</button>
</div>

<div id="game-screen">
    <div class="score-board">
        <div class="score-box" id="box-opp"><div class="score-label">Opponent</div><div id="opp-score" class="score-val">0</div></div>
        <div class="score-box" id="box-me"><div class="score-label">You</div><div id="my-score" class="score-val">0</div></div>
    </div>
    <div id="status-msg">Connecting to Server...</div>
    <div class="field">
        <div id="prediction-tag">HIGH</div>
        <div class="slot" id="p-slot"></div><div class="slot" id="c-slot"></div>
    </div>
    <div class="btn-group">
        <button id="h-btn" class="btn" onclick="predict('HIGH')" disabled>HIGH</button>
        <button id="l-btn" class="btn" onclick="predict('LOW')" disabled>LOW</button>
    </div>
</div>

<script>
    let ws; let room; let myIndex = -1;
    const SERVER_URL = 'wss://high-low-game-i5xg.onrender.com';

    function startOnline() {
        room = document.getElementById('room-id').value;
        if(!room) return alert("IDを入力してください");
        connect();
        document.getElementById('setup-overlay').style.display = 'none';
    }

    function connect() {
        ws = new WebSocket(SERVER_URL);
        ws.onopen = () => ws.send(JSON.stringify({type: 'JOIN', room: room}));
        ws.onmessage = (e) => handleServerData(JSON.parse(e.data));
        ws.onclose = () => { document.getElementById('status-msg').innerText = "Reconnecting..."; setTimeout(connect, 3000); };
    }

    function handleServerData(data) {
        if (data.scores && myIndex !== -1) {
            const mS = data.scores[myIndex]; const oS = data.scores[1 - myIndex];
            document.getElementById('my-score').innerText = mS;
            document.getElementById('opp-score').innerText = oS;
            if (mS >= 10) showWinner("YOU"); else if (oS >= 10) showWinner("OPPONENT");
        }
        switch(data.type) {
            case 'ASSIGN_ID': myIndex = data.index; break;
            case 'OPPONENT_LEFT': document.getElementById('fled-overlay').style.display = 'flex'; break;
            case 'TURN': handleTurn(data); break;
            case 'RESULT': handleResult(data); break;
            case 'WAITING': document.getElementById('status-msg').innerText = "WAITING FOR OPPONENT..."; break;
            case 'START': document.getElementById('status-msg').innerText = "GAME START!"; break;
        }
    }

    function handleTurn(data) {
        document.getElementById('prediction-tag').style.display = 'none';
        document.getElementById('p-slot').innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        document.getElementById('c-slot').innerHTML = `<div class="card card-back"></div>`;
        const isChild = (data.role === 'CHILD');
        document.getElementById('status-msg').innerText = isChild ? "YOUR TURN: HIGH OR LOW?" : "OPPONENT'S TURN...";
        document.getElementById('h-btn').disabled = !isChild; document.getElementById('l-btn').disabled = !isChild;
        document.getElementById('box-me').className = isChild ? 'score-box active' : 'score-box';
        document.getElementById('box-opp').className = isChild ? 'score-box' : 'score-box active';
    }

    function predict(choice) {
        ws.send(JSON.stringify({type: 'PREDICT', room: room, choice: choice}));
        const tag = document.getElementById('prediction-tag');
        tag.innerText = choice; tag.style.display = 'block'; tag.style.color = (choice === 'HIGH' ? '#ffeb3b' : '#03a9f4');
        document.getElementById('h-btn').disabled = true; document.getElementById('l-btn').disabled = true;
    }

    function handleResult(data) {
        document.getElementById('c-slot').innerHTML = `<div class="card"><img src="images/png/${getCardFile(data.card)}"></div>`;
        const tag = document.getElementById('prediction-tag');
        tag.innerText = data.choice; tag.style.display = 'block';
        if (data.win) { 
            document.getElementById('status-msg').innerHTML = "<span style='color:#00ff00'>MATCH! +1 PT</span>";
            document.body.className = 'win-flash'; setTimeout(()=>document.body.className='', 500);
        } else { document.getElementById('status-msg').innerText = "MISS..."; }
    }

    function showWinner(winner) {
        const ov = document.getElementById('winner-overlay');
        ov.style.display = 'flex';
        document.getElementById('winner-msg').innerText = (winner === "YOU" ? "あなたが完全勝利を収めました！" : "対戦相手が勝利しました。");
    }

    function getCardFile(n) {
        const suits = ['hearts', 'spades', 'diamonds', 'clubs'];
        const suit = suits[Math.floor((n-1)/13)];
        let val = (n-1) % 13 + 1;
        const names = {1:'ace', 11:'jack', 12:'queen', 13:'king'};
        return `${names[val] || val}_of_${suit}.png`;
    }
</script>
</body>
</html>
